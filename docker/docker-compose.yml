services:
  nextjs-app:
    container_name: portfolio-nextjs-app
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3001:3000"
    env_file:
      - ../.env.production
    networks:
      - proxy-network
    mem_reservation: 256m
    mem_limit: 1g

networks:
  proxy-network:
    external: true
